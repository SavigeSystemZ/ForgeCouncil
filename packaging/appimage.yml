version: 1

script:
  - mkdir -p AppDir/usr/bin
  - mkdir -p AppDir/usr/share/applications
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - install -Dm755 ./dist/forge-council AppDir/usr/bin/forge-council
  - install -Dm644 ./packaging/io.aiaast.forge.council.desktop AppDir/usr/share/applications/io.aiaast.forge.council.desktop

AppDir:
  path: ./AppDir
  app_info:
    id: io.aiaast.forge.council
    name: Forge Council
    icon: io.aiaast.forge.council
    version: 0.1.0
    exec: usr/bin/forge-council
    exec_args: "$@"

  runtime:
    env:
      APP_BIND_ADDRESS: 127.0.0.1
      APP_CONFIG_DIR: /etc/forge-council
      APP_DATA_DIR: /var/lib/forge-council

  test:
    fedora-latest:
      command: ./AppRun --version

AppImage:
  arch: x86_64
  update-information: guess
